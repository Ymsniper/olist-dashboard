name: CI — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & syntax check ──────────────────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8 (style + syntax check)
        run: |
          # Stop build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --exit-zero --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ── Job 2: Install dependencies check ───────────────────────────────────────
  install-check:
    name: Dependency install check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify dashboard import
        run: |
          # Confirm dashboard module loads without errors
          # Uses a stub DB path — full runtime test requires olist_dw.db
          python -c "
          import sys, types
          # Stub sqlite3 so dashboard.py doesn't crash without the DB
          import unittest.mock as mock
          import pandas as pd

          empty_df = pd.DataFrame(columns=['annee','mois','nom_mois','region',
                                           'ca_total','nb_commandes','panier_moyen',
                                           'periode','score_satisfaction','nb',
                                           'categorie','ca_categorie','score_moyen',
                                           'nb_ventes','etat','delai_moyen','trimestre'])

          with mock.patch('sqlite3.connect'), \
               mock.patch('pandas.read_sql_query', return_value=empty_df):
              import importlib.util, os
              spec = importlib.util.spec_from_file_location('dashboard', 'dashboard.py')
              mod  = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
              assert hasattr(mod, 'server'), 'server object missing — gunicorn will fail'
              print('✅ dashboard.py imports OK and exposes server')
          "

  # ── Job 3: Trigger Render deploy (push to main only) ─────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: install-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | grep -q "^2" \
            && echo "✅ Render deploy triggered" \
            || echo "⚠️  Deploy hook call failed — check RENDER_DEPLOY_HOOK_URL secret"
